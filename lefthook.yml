---
# Lefthook config — strict-mode local quality gates.
#
# Pre-commit (sequential): gitleaks → lint-staged.
# Commit-msg: commitlint.
# Pre-push (parallel): every quality gate.
# Strict-mode rules: gitleaks is hard-required, lint runs with `--max-warnings 0`,
# coverage threshold is 100/100/100/100.

skip_output:
  - meta
  - execution_info
  - execution_out

pre-commit:
  piped: true
  commands:
    01-bot-identity:
      run: |
        if echo "$(pwd)" | grep -q "/.claude/worktrees/"; then
          COMMITTER_NAME=$(git config user.name 2>/dev/null || echo "")
          if [ "$COMMITTER_NAME" != "stivoo-bot" ]; then
            echo "ERROR: Worktree commits must use the stivoo-bot identity."
            echo "       Current user.name: '$COMMITTER_NAME'"
            echo "       Run: git config --worktree user.name 'stivoo-bot'"
            exit 1
          fi
        fi
    02-gitleaks:
      run: |
        if ! command -v gitleaks >/dev/null 2>&1; then
          echo "ERROR: gitleaks not installed. Install with: brew install gitleaks"
          echo "       Strict mode requires gitleaks. No soft skip."
          exit 1
        fi
        gitleaks protect --staged --redact --verbose --config .gitleaks.toml
    03-lint-staged:
      run: pnpm exec lint-staged

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  jobs:
    # Phase 0 — fetch origin/main ONCE before any parallel job runs. Many
    # parallel checks diff against `origin/main`; without this, each would
    # fetch independently and risk flaky SSH dropping refs silently.
    # Continues on fetch failure so offline pushes still proceed.
    - name: fetch-base
      run: git fetch --no-tags --quiet origin main 2>/dev/null || true
    - name: parallel-checks
      group:
        parallel: true
        jobs:
          - name: prettier
            run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md,yml,yaml}"
          - name: md-lint
            run: pnpm exec markdownlint-cli2
          - name: knip
            run: pnpm exec knip --no-progress
          - name: jscpd
            run: pnpm exec jscpd .
          - name: license-check
            run: make license-check
          - name: audit
            run: pnpm audit --audit-level=moderate
          - name: dedupe-check
            run: pnpm dedupe --check
          - name: test-shell
            run: |
              if ! command -v shellcheck >/dev/null 2>&1; then
                echo "ERROR: shellcheck not installed. Install with: brew install shellcheck"
                exit 1
              fi
              files=$(find tools scripts bin -maxdepth 2 -type f -name "*.sh" 2>/dev/null)
              if [ -z "$files" ]; then echo "test-shell: no shell scripts found"; exit 0; fi
              echo "Checking: $files"
              shellcheck $files
          - name: yamllint
            run: |
              if ! command -v yamllint >/dev/null 2>&1; then
                echo "ERROR: yamllint not installed. Install with: brew install yamllint"
                exit 1
              fi
              yamllint -c .yamllint .github/ lefthook.yml
          - name: type-check
            run: pnpm type-check
          - name: plugin-lint
            run: cd plugin && pnpm run lint
          - name: plugin-depcruise
            run: cd plugin && pnpm run depcruise
          - name: plugin-test-coverage
            run: cd plugin && CI=true pnpm run test:coverage
          - name: shared-lint
            run: cd shared && pnpm run lint
          - name: shared-depcruise
            run: cd shared && pnpm run depcruise
          - name: shared-test-coverage
            run: cd shared && CI=true pnpm run test:coverage
          - name: openapi-check
            run: pnpm openapi:check
          - name: openapi-lint
            run: pnpm openapi:lint
          - name: swift-build
            tags: macos
            skip:
              - run: '[ "$(uname)" != "Darwin" ]'
            run: |
              if ! command -v swift >/dev/null 2>&1; then
                echo "swift not installed; skipping swift-build"
                exit 0
              fi
              make swift-build
          - name: swift-test
            tags: macos
            skip:
              - run: '[ "$(uname)" != "Darwin" ]'
            run: |
              if ! command -v swift >/dev/null 2>&1; then
                echo "swift not installed; skipping swift-test"
                exit 0
              fi
              make swift-test
          - name: swift-format-check
            tags: macos
            skip:
              - run: '[ "$(uname)" != "Darwin" ]'
            run: |
              if ! command -v swift-format >/dev/null 2>&1; then
                echo "swift-format not installed; skipping swift-format-check"
                exit 0
              fi
              make swift-format-check
          - name: swift-lint
            tags: macos
            skip:
              - run: '[ "$(uname)" != "Darwin" ]'
            run: |
              if ! command -v swiftlint >/dev/null 2>&1; then
                echo "swiftlint not installed; skipping swift-lint"
                exit 0
              fi
              make swift-lint
          - name: py-lint
            run: |
              if [ ! -d diarizer/.venv ]; then
                echo "py-lint: skipping — run 'make py-install' first"
                exit 0
              fi
              make py-lint
          - name: py-typecheck
            run: |
              if [ ! -d diarizer/.venv ]; then
                echo "py-typecheck: skipping — run 'make py-install' first"
                exit 0
              fi
              make py-typecheck
          - name: py-test
            run: |
              if [ ! -d diarizer/.venv ]; then
                echo "py-test: skipping — run 'make py-install' first"
                exit 0
              fi
              make py-test
          - name: py-bandit
            run: |
              if [ ! -d diarizer/.venv ]; then
                echo "py-bandit: skipping — run 'make py-install' first"
                exit 0
              fi
              make py-bandit

    - name: flaky-check
      run: node scripts/check-flaky.mjs
