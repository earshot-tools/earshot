---
# Periphery config for the Earshot native helper.
# Strict mode: any unused symbol = error.
retain_public: false
retain_assign_only_property_types: []
retain_objc_accessible: false
retain_objc_annotated: true
retain_files: []
external_encodable_protocols: []
external_test_case_classes: []
clean_build: false
disable_update_check: true
relative_results: true
strict: true
verbose: false
quiet: false
disable_redundant_public_analysis: false
report_includes: []
report_excludes:
  - '.build'
  - '.swiftpm'
  - 'DerivedData'
