---
name: OSV-Scanner

'on':
  pull_request:
    branches: [main]
  schedule:
    - cron: '24 7 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
