---
name: CI

'on':
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system binaries required by ci-local
        run: |
          set -euo pipefail
          # gitleaks (free CLI, pinned)
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
          # shellcheck + yamllint via apt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck yamllint
          shellcheck --version | head -2
          yamllint --version

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python diarizer dev deps
        run: |
          python -m venv diarizer/.venv
          diarizer/.venv/bin/pip install --upgrade pip
          diarizer/.venv/bin/pip install -e "diarizer[dev]"

      - name: make ci-local
        run: make ci-local

  swift-quality:
    name: Swift quality gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Swift toolchain helpers
        run: |
          brew install swiftlint swift-format periphery
          swift --version
          swiftlint version
          swift-format --version
          periphery version

      - name: make swift-quality
        run: make swift-quality
