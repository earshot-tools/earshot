---
name: Feature request
description: Something new to build
labels: ['enhancement']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be built?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Motivation. Reference D-XXXX/E-XXXX if applicable.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What this issue does NOT cover
