---
name: Task / chore
description: Refactor, chore, docs, or maintenance work
labels: ['enhancement']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Motivation. Reference D-XXXX/E-XXXX if applicable.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What this task covers
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What this task does NOT cover
